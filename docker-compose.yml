services:
    node1:
        build:
            context: .
            dockerfile: Dockerfile
        container_name: raftust-node1
        command:
            - --id
            - "1"
            - --addr
            - 0.0.0.0:5001
            - --peer
            - 2=node2:5002
            - --peer
            - 3=node3:5003
            - --peer
            - 4=node4:5004
            - --peer
            - 5=node5:5005
        ports:
            - "5001:5001"
        stdin_open: true
        tty: true
        healthcheck:
            test: ["CMD-SHELL", "nc -z 127.0.0.1 5001 || exit 1"]
            interval: 5s
            timeout: 3s
            retries: 5
            start_period: 10s

    node2:
        build:
